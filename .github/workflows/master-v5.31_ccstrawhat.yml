# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - ccstrawhat

on:
  push:
    branches:
      - master-v5.31
  workflow_dispatch:
env:
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '16.13.0' 
  
jobs:
  build:
    runs-on: windows-latest

    steps:
    
      - uses: actions/checkout@v4

      - uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: subdir/package-lock.json
      - run: npm ci
      - run: npm test

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '6.0.x'
          include-prerelease: false

       # Run dotnet build and publish
      - name: dotnet build and publish
        run: |
          dotnet restore "Source\CompanyCommunicator\Microsoft.Teams.Apps.CompanyCommunicator.csproj"
          dotnet build --configuration Release "Source\CompanyCommunicator\Microsoft.Teams.Apps.CompanyCommunicator.csproj"
          dotnet publish -c Release "Source\CompanyCommunicator\Microsoft.Teams.Apps.CompanyCommunicator.csproj" -o '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp' 

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_662FF65C582B420BB83BCE4CF5598991 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5789253C6DE74BDCAD73A326D35DB17C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24C0E055E4E34CFF9B7135782E005FFD }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'ccstrawhat'
          slot-name: 'Production'
          package: .
          
