# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - ccstrawhat

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '3.1'
          include-prerelease: true

             # Run dotnet build and publish
      - name: dotnet build and publish
        run: |
          dotnet restore "MyKudos.Kudos.Api\MyKudos.Kudos.Api.csproj"
          dotnet build --configuration Release "MyKudos.Kudos.Api\MyKudos.Kudos.Api.csproj"
          dotnet publish -c Release "MyKudos.Kudos.Api\MyKudos.Kudos.Api.csproj" -o '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp' 

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_12363FE0D9944A2591179C4A64DCF7E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_137D3CC7B89147C3AF7B8D30865BE60B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2F95E9DA49034F18928EF867711906EC }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'ccstrawhat'
          slot-name: 'Production'
          package: .
          
